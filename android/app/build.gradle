plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def releaseSigning = [
    storeFile: System.getenv('ANDROID_KEYSTORE_PATH'),
    storePassword: System.getenv('ANDROID_KEYSTORE_PASSWORD'),
    keyAlias: System.getenv('ANDROID_KEY_ALIAS'),
    keyPassword: System.getenv('ANDROID_KEY_PASSWORD'),
]
def hasReleaseSigning = releaseSigning.values().every { value ->
    value != null && !value.trim().isEmpty()
}
if (System.getenv('CI')?.equalsIgnoreCase('true') && !hasReleaseSigning) {
    throw new GradleException(
        'CI release signing is not configured. Set all ANDROID_KEYSTORE_* variables.'
    )
}

android {
    namespace "com.melobox.app"
    compileSdk 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId "com.melobox.app"
        minSdkVersion flutter.minSdkVersion
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile file(releaseSigning.storeFile)
                storePassword releaseSigning.storePassword
                keyAlias releaseSigning.keyAlias
                keyPassword releaseSigning.keyPassword
            }
        }
    }

    buildTypes {
        release {
            signingConfig hasReleaseSigning
                ? signingConfigs.release
                : signingConfigs.debug
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

flutter {
    source '../..'
}

dependencies {}
