name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 配置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 配置 Flutter 环境
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true # 开启缓存加速后续构建
        # 可选：如果你需要指定特定的 Flutter 版本，可以解开下一行
        # flutter-version: '3.22.0'

    - name: 安装依赖
      run: flutter pub get

    # 可选：如果项目有编写测试或需要代码检查，可以取消注释
    # - name: 代码静态检查
    #   run: flutter analyze
    # - name: 运行单元测试
    #   run: flutter test

    - name: 编译 Android APK
      run: flutter build apk --debug
