name: Android Auto Release

on:
  push:
    # 只有当你提交以 v 开头的标签（如 v1.1.0, v2.0.3）时，才会触发这个打包工作流
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许工作流向你的仓库写入 Release 产物

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    # 自动解析当前 Git Tag。例如标签是 v1.1.0，它会提取出 1.1.0 作为版本号
    - name: 解析版本号
      id: get_version
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        VERSION_NAME=${TAG_NAME#v}
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "build_number=$GITHUB_RUN_NUMBER" >> $GITHUB_OUTPUT

    - name: 配置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 配置 Flutter 环境
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: 安装依赖
      run: flutter pub get

    # 使用上面解析出来的版本号和 GitHub 自动递增的构建号进行编译
    - name: 编译正式版 APK
      run: |
        flutter build apk --release \
          --build-name=${{ steps.get_version.outputs.version_name }} \
          --build-number=${{ steps.get_version.outputs.build_number }}

    # 自动在 GitHub 上创建一个 Release 页面，并将编译好的 APK 挂载上去
    - name: 创建 GitHub Release 并上传 APK
      uses: softprops/action-gh-release@v2
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
        name: MeloBoxApp ${{ env.GITHUB_REF_NAME }}
        tag_name: ${{ env.GITHUB_REF_NAME }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
