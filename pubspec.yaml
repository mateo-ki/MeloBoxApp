name: melobox_app
description: A Flutter video streaming application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 网络请求
  http: ^1.1.0
  dio: ^5.4.0

  # 状态管理
  provider: ^6.1.1

  # 视频播放器
  video_player: ^2.8.1
  chewie: ^1.7.4
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.7

  # UI 组件
  cached_network_image: ^3.3.0
  flutter_spinkit: ^5.2.0

  # 数据解析
  xml: ^6.5.0
  crypto: ^3.0.7

  # 本地存储
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - api_sites.json
